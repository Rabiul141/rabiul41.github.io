<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Skills - Mahir Dev</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0b0f1a, #111827);
      color: white;
    }

    header {
      padding: 20px;
      background: rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    header h2 {
      margin: 0;
      color: #00ffcc;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 10px;
    }

    nav a:hover {
      color: #00ffcc;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      color: #00ffcc;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 40px;
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .skill-card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,255,204,0.08);
      transition: 0.3s;
    }

    .skill-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 25px rgba(0,255,204,0.2);
    }

    .skill-title {
      font-size: 18px;
      margin-bottom: 10px;
      color: #00ffcc;
    }

    .bar {
      width: 100%;
      height: 10px;
      background: #1f2937;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress {
      height: 10px;
      background: #00ffcc;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 40px;
      padding: 10px 20px;
      background: #00ffcc;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      background: #00c9a7;
    }
  </style>
</head>

<body>

<header>
  <h2>🎮 Mahir Dev</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="skills.html">Skills</a>
  </nav>
</header>

<div class="container">
  <h1>My Skills</h1>
  <p>Here are my technical skills as a Game & App Developer</p>

  <div class="skills-grid">

    <div class="skill-card">
      <div class="skill-title">HTML</div>
      <div class="bar"><div class="progress" style="width: 90%"></div></div>
    </div>

    <div class="skill-card">
      <div class="skill-title">CSS</div>
      <div class="bar"><div class="progress" style="width: 85%"></div></div>
    </div>

    <div class="skill-card">
      <div class="skill-title">JavaScript</div>
      <div class="bar"><div class="progress" style="width: 75%"></div></div>
    </div>

    <div class="skill-card">
      <div class="skill-title">Unity (Game Dev)</div>
      <div class="bar"><div class="progress" style="width: 70%"></div></div>
    </div>

    <div class="skill-card">
      <div class="skill-title">C#</div>
      <div class="bar"><div class="progress" style="width: 65%"></div></div>
    </div>

    <div class="skill-card">
      <div class="skill-title">UI/UX Design</div>
      <div class="bar"><div class="progress" style="width: 80%"></div></div>
    </div>

  </div>

  <a class="btn" href="index.html">⬅ Back to Home</a>
</div>

</body>
</html>
